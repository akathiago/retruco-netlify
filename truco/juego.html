    <!-- Canonical -->
    <link rel="canonical" href="https://retruco.xyz/truco/juego.html">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon/favicon-32x32.png">
    <link rel="shortcut icon" href="../favicon/favicon.ico">
    <link rel="apple-touch-icon" href="../favicon/apple-touch-icon.png">
    <meta name="theme-color" content="#0a0a0a">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        @font-face {
            font-family: 'Trevor';
            src: url('../fuentes/TREVOR.TTF') format('truetype');
            font-weight: bold;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --rust: #2bb8cd;
            --paper: #f0f0f0;
            --ink: #0a0a0a;
            --bg: #0a0a0a;
            --card-bg: #f5f0e1;
            --gold: #d4af37;
            --red: #ff4757;
            --green: #2ed573;
            --table-green: #1a5c3a;
            --table-border: #0f3d26;
            --accent: #2bb8cd;
        }

        body {
            background: var(--bg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: var(--paper);
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        /* Dark overlay for readability */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(
                180deg,
                rgba(0,0,0,0.7) 0%,
                rgba(0,0,0,0.4) 30%,
                rgba(0,0,0,0.4) 70%,
                rgba(0,0,0,0.8) 100%
            );
            pointer-events: none;
            z-index: 0;
        }

        body > * {
            position: relative;
            z-index: 1;
        }

        /* ====== HEADER ====== */
        .game-header {
            width: 100%;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            flex-shrink: 0;
            position: relative;
        }

        .score-display {
            display: flex;
            gap: 12px;
            align-items: center;
            font-family: 'Trevor', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 3px;
            white-space: nowrap;
            background: rgba(0,0,0,0.6);
            padding: 12px 24px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.15);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .score-you { color: var(--green); text-shadow: 0 0 10px var(--green); }
        .score-sep { color: rgba(255,255,255,0.3); font-size: 1.2rem; }
        .score-opp { color: var(--red); text-shadow: 0 0 10px var(--red); }
        .score-num { font-size: 1.8rem; font-weight: 700; }

        .back-link {
            color: #fff;
            text-decoration: none;
            font-family: 'Trevor', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 2px;
            opacity: 0.5;
            transition: all 0.2s;
            padding: 8px 12px;
            border-radius: 20px;
        }
        .back-link:hover {
            opacity: 1;
            background: rgba(255,255,255,0.1);
        }

        /* ====== OPPONENT AREA ====== */
        .opponent-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 15px 20px;
            flex-shrink: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, transparent 100%);
        }

        .opponent-center {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .opponent-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            box-shadow:
                0 0 20px rgba(43,184,205,0.4),
                0 4px 15px rgba(0,0,0,0.5);
            object-fit: cover;
            object-position: top;
            transition: all 0.3s ease;
        }

        .opponent-avatar.placeholder-portrait {
            filter: brightness(0.15) contrast(0.8);
            background: var(--ink);
        }

        .opponent-avatar.angry {
            border-color: var(--red);
            box-shadow: 0 0 25px rgba(255,71,87,0.5);
            animation: shake 0.4s ease;
        }

        .opponent-avatar.happy {
            border-color: var(--green);
            box-shadow: 0 0 20px rgba(46,204,113,0.4);
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }

        .opponent-name {
            font-family: 'Trevor', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 4px;
            color: var(--accent);
            white-space: nowrap;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* Speech bubble */
        .speech-bubble {
            background: rgba(0,0,0,0.85);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            padding: 12px 20px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            max-width: 280px;
            min-height: 24px;
            text-align: center;
            opacity: 0;
            transform: scale(0.8) translateY(-5px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
        }

        .speech-bubble.show {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* ====== PLAY ZONE ====== */
        .play-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            min-height: 0;
            position: relative;
        }


        .card-pile {
            width: 320px;
            height: 260px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-pile .card {
            position: absolute;
            width: 100px;
            height: 144px;
            cursor: default;
            box-shadow: 4px 6px 20px rgba(0,0,0,0.6);
        }

        .card-pile .card.player-card {
            /* Player cards come from bottom */
        }

        .card-pile .card.cpu-card {
            /* CPU cards come from top */
        }

        .card-pile.highlight {
            background: radial-gradient(circle, rgba(43,184,205,0.15) 0%, transparent 70%);
            border-radius: 50%;
        }

        .card-pile.highlight::after {
            content: 'SOLTÁ ACÁ';
            position: absolute;
            bottom: -25px;
            font-family: 'Trevor', sans-serif;
            font-size: 0.5rem;
            letter-spacing: 2px;
            color: var(--accent);
            opacity: 0.8;
        }

        .round-badges {
            display: flex;
            gap: 8px;
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
        }

        .round-badge {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 0.5rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .badge-win { background: var(--green); color: #fff; }
        .badge-lose { background: var(--red); color: #fff; }
        .badge-tie { background: #666; color: #fff; }

        /* Envido reveal area */
        .envido-reveal {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 8px 0;
        }

        .envido-reveal.show { display: flex; }

        .envido-points { text-align: center; }

        .envido-points-label {
            font-size: 0.55rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.4);
            font-family: 'Trevor', sans-serif;
        }

        .envido-points-value {
            font-family: 'Trevor', sans-serif;
            font-size: 1.8rem;
            animation: countUp 0.5s ease;
        }

        @keyframes countUp {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .envido-win { color: var(--green); }
        .envido-lose { color: var(--red); }

        /* ====== GAME MESSAGE ====== */
        .game-message {
            font-family: 'Trevor', sans-serif;
            font-size: clamp(0.9rem, 3.5vw, 1.2rem);
            letter-spacing: 4px;
            color: #fff;
            text-align: center;
            padding: 10px 20px;
            flex-shrink: 0;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 20px var(--accent), 0 2px 10px rgba(0,0,0,0.5);
            background: linear-gradient(90deg, transparent, rgba(0,0,0,0.3), transparent);
        }

        /* ====== PLAYER AREA ====== */
        .player-area {
            flex-shrink: 0;
            padding: 8px 15px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%);
        }

        .player-label {
            font-family: 'Trevor', sans-serif;
            font-size: 0.55rem;
            letter-spacing: 5px;
            color: rgba(255,255,255,0.3);
            text-shadow: 0 1px 5px rgba(0,0,0,0.5);
        }

        .hand {
            display: flex;
            gap: 15px;
            justify-content: center;
            perspective: 1000px;
        }

        /* ====== CARDS ====== */
        .card {
            width: 105px;
            height: 151px;
            border-radius: 12px;
            border: 3px solid #333;
            box-shadow:
                0 4px 8px rgba(0,0,0,0.3),
                0 8px 25px rgba(0,0,0,0.2);
            position: relative;
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: default;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--card-bg);
            background-image: radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.4), transparent 60%);
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 4px;
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 6px;
            pointer-events: none;
        }

        .card.playable {
            cursor: grab;
            border-color: var(--accent);
            touch-action: none;
            box-shadow:
                0 4px 8px rgba(0,0,0,0.3),
                0 8px 25px rgba(0,0,0,0.2),
                0 0 20px rgba(43,184,205,0.3);
        }

        .card.playable:hover {
            transform: translateY(-20px) rotate(-3deg) scale(1.08);
            box-shadow:
                0 15px 35px rgba(0,0,0,0.5),
                0 0 30px rgba(43,184,205,0.4);
            border-color: var(--accent);
            z-index: 10;
        }

        .card.dragging {
            cursor: grabbing;
            z-index: 100;
            box-shadow: 10px 20px 40px rgba(0,0,0,0.6);
            transform: scale(1.15) rotate(8deg);
        }

        .hand .card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .hand .card.dragging {
            transition: none;
        }

        .card-number {
            font-family: 'Trevor', sans-serif;
            font-size: 1.8rem;
            line-height: 1;
        }

        .card-suit { font-size: 1.6rem; margin-top: 3px; }

        .card-corner {
            position: absolute;
            top: 5px;
            left: 7px;
            font-size: 0.55rem;
            font-weight: 700;
            line-height: 1.1;
            text-align: center;
        }

        .card-corner-br {
            position: absolute;
            bottom: 5px;
            right: 7px;
            font-size: 0.55rem;
            font-weight: 700;
            line-height: 1.1;
            text-align: center;
            transform: rotate(180deg);
        }

        .suit-espadas .card-number, .suit-espadas .card-corner, .suit-espadas .card-corner-br { color: #1a5276; }
        .suit-bastos .card-number, .suit-bastos .card-corner, .suit-bastos .card-corner-br { color: #1e8449; }
        .suit-copas .card-number, .suit-copas .card-corner, .suit-copas .card-corner-br { color: var(--red); }
        .suit-oros .card-number, .suit-oros .card-corner, .suit-oros .card-corner-br { color: var(--gold); }

        .card.card-img {
            background: #f5f0e1 !important;
            background-image: none !important;
            border: 2px solid rgba(0,0,0,0.25);
            border-radius: 8px;
            box-shadow: 2px 4px 12px rgba(0,0,0,0.4);
            overflow: hidden;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .card.card-img::before { display: none; }
        .card.card-img img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 6px;
            pointer-events: none;
        }
        .card.card-img .card-shine {
            position: absolute;
            inset: 0;
            z-index: 1;
            border-radius: 6px;
            background: linear-gradient(
                135deg,
                rgba(255,255,255,0.2) 0%,
                transparent 50%,
                rgba(0,0,0,0.05) 100%
            );
            pointer-events: none;
        }
        .card.card-img.playable {
            border-color: var(--accent);
            box-shadow: 2px 4px 12px rgba(0,0,0,0.4), 0 0 15px rgba(43,184,205,0.3);
        }
        .card.card-img.playable:hover {
            transform: translateY(-15px) scale(1.05);
            box-shadow: 4px 12px 24px rgba(0,0,0,0.5), 0 0 25px rgba(43,184,205,0.4);
        }

        /* ====== ACTION BAR ====== */
        .action-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            min-height: 56px;
            padding: 8px 15px 20px;
            flex-shrink: 0;
            align-items: center;
        }

        .btn-game {
            font-family: 'Trevor', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, var(--accent) 0%, #1a8a9c 100%);
            color: #fff;
            box-shadow:
                0 4px 15px rgba(43,184,205,0.4),
                inset 0 1px 0 rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.2s ease;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .btn-game:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow:
                0 8px 25px rgba(43,184,205,0.5),
                inset 0 1px 0 rgba(255,255,255,0.2);
        }

        .btn-game:active {
            transform: translateY(0) scale(0.98);
            box-shadow: 0 2px 10px rgba(43,184,205,0.3);
        }

        .btn-game.btn-accept {
            background: linear-gradient(135deg, var(--green) 0%, #1e9c5a 100%);
            box-shadow: 0 4px 15px rgba(46,213,115,0.4);
        }

        .btn-game.btn-reject {
            background: linear-gradient(135deg, var(--red) 0%, #c0392b 100%);
            box-shadow: 0 4px 15px rgba(255,71,87,0.4);
        }

        .btn-game.btn-envido {
            background: linear-gradient(135deg, var(--gold) 0%, #b8860b 100%);
            box-shadow: 0 4px 15px rgba(212,175,55,0.4);
        }

        .btn-game.btn-mazo {
            background: linear-gradient(135deg, #555 0%, #333 100%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-size: 0.65rem;
            padding: 10px 18px;
            opacity: 0.7;
        }
        .btn-game.btn-mazo:hover { opacity: 1; }

        /* ====== OVERLAY ====== */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            backdrop-filter: blur(10px);
        }

        .overlay.show {
            display: flex;
            animation: overlayIn 0.4s ease;
        }

        @keyframes overlayIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .overlay-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            object-position: top;
            border: 4px solid;
            box-shadow: 0 0 40px rgba(0,0,0,0.6), 0 0 60px currentColor;
        }

        .overlay-text {
            font-family: 'Trevor', sans-serif;
            font-size: clamp(2rem, 10vw, 4rem);
            letter-spacing: 6px;
            text-shadow: 0 4px 30px currentColor;
        }

        .overlay-sub {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 3px;
        }

        .overlay-quote {
            font-style: italic;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.4);
            max-width: 300px;
            text-align: center;
            line-height: 1.6;
        }

        .overlay .btn-game {
            font-size: 1rem;
            padding: 16px 40px;
            margin-top: 10px;
            margin-top: 5px;
        }

        /* ====== MOBILE ====== */
        @media (max-width: 420px) {
            .card { width: 80px; height: 115px; }
            .card-number { font-size: 1.4rem; }
            .card-suit { font-size: 1.2rem; }
            .card-corner, .card-corner-br { display: none; }
            .hand { gap: 8px; }
            .card-pile .card { width: 75px; height: 108px; }
            .opponent-avatar { width: 50px; height: 50px; }
            .opponent-name { font-size: 1.1rem; letter-spacing: 2px; }
            .opponent-center { gap: 10px; }
            .speech-bubble { font-size: 0.8rem; max-width: 200px; padding: 8px 14px; }
            .score-display { padding: 8px 16px; gap: 8px; font-size: 0.7rem; }
            .score-display .score-num { font-size: 1.3rem; }
            .score-display .score-sep { font-size: 1rem; }
            .btn-game { padding: 8px 14px; font-size: 0.65rem; }
        }

        @media (max-height: 680px) {
            .felt-table { padding: 8px; gap: 4px; }
            .card-pile .card { width: 72px; height: 104px; }
            .card { width: 78px; height: 112px; }
            .card-number { font-size: 1.35rem; }
            .card-suit { font-size: 1.15rem; }
            .opponent-area { padding: 5px 12px; }
            .player-area { padding: 2px 12px 4px; }
            .game-message { padding: 3px 0; min-height: 24px; }
        }

        /* ====== ENHANCED VISUAL POLISH ====== */

        /* Card inner structure */
        .card-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .card-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Card shine effect (glossy overlay) */
        .card-shine {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                135deg,
                rgba(255,255,255,0.25) 0%,
                rgba(255,255,255,0.1) 30%,
                transparent 50%,
                rgba(0,0,0,0.02) 100%
            );
            border-radius: 5px;
            pointer-events: none;
            opacity: 0.8;
        }

        .card.playable:hover .card-shine {
            opacity: 1;
            background: linear-gradient(
                135deg,
                rgba(255,255,255,0.35) 0%,
                rgba(255,255,255,0.15) 30%,
                transparent 50%,
                rgba(43,184,205,0.05) 100%
            );
        }

        /* Improved card shadows and depth */
        .card {
            box-shadow:
                1px 1px 0 rgba(0,0,0,0.15),
                2px 2px 2px rgba(0,0,0,0.12),
                4px 4px 8px rgba(0,0,0,0.1),
                0 0 0 1px rgba(0,0,0,0.05);
            transform-style: preserve-3d;
        }

        .card.playable {
            box-shadow:
                1px 1px 0 rgba(0,0,0,0.15),
                2px 2px 2px rgba(0,0,0,0.12),
                4px 4px 8px rgba(0,0,0,0.1),
                0 0 8px rgba(43,184,205,0.15);
        }

        .card.playable:hover {
            box-shadow:
                0 0 25px rgba(43,184,205,0.4),
                4px 8px 16px rgba(0,0,0,0.35),
                8px 16px 32px rgba(0,0,0,0.2);
        }

        /* Enhanced table depth */
        .felt-table {
            box-shadow:
                0 4px 8px rgba(0,0,0,0.3),
                0 8px 24px rgba(0,0,0,0.25),

<script>
// ====== PRELOADER ======
(function() {
    document.body.style.overflow = 'hidden';

    const counterElement = document.getElementById('counter');
    const preloader = document.getElementById('preloader');
    const cesarCharacter = document.querySelector('.preloader-character');

    let currentProgress = 0;
    let targetProgress = 0;
    let loadingComplete = false;

    // Función para pestañear
    function cesarBlink() {
        cesarCharacter.classList.add('cesar-blinking');
        setTimeout(() => {
            cesarCharacter.classList.remove('cesar-blinking');
        }, 800);
    }

    // Pestañear cada 0.5-1.5 segundos aleatorio
    function scheduleNextBlink() {
        const randomDelay = 500 + Math.random() * 1000;
        setTimeout(() => {
            if (!loadingComplete) {
                cesarBlink();
                scheduleNextBlink();
            }
        }, randomDelay);
    }
    scheduleNextBlink();

    // Obtener todas las imágenes (excluyendo las del preloader)
    const images = Array.from(document.querySelectorAll('img:not(.cesar-eyes):not(.cesar-blink)'));
    const totalResources = images.length + 1;
    let loadedResources = 0;

    function updateProgress() {
        targetProgress = Math.min(Math.round((loadedResources / totalResources) * 100), 100);
    }

    function animateCounter() {
        if (currentProgress < targetProgress) {
            currentProgress++;
            counterElement.textContent = `${currentProgress}%`;
        }

        if (currentProgress >= 100) {
            loadingComplete = true;
            preloader.style.opacity = '0';
            preloader.style.pointerEvents = 'none';
            document.body.style.overflow = '';
            return;
        }

        requestAnimationFrame(animateCounter);
    }

    animateCounter();

    // Track image loading
    images.forEach(img => {
        if (img.complete) {
            loadedResources++;
            updateProgress();
        } else {
            img.addEventListener('load', () => { loadedResources++; updateProgress(); });
            img.addEventListener('error', () => { loadedResources++; updateProgress(); });
        }
    });

    // Window load como recurso final
    window.addEventListener('load', () => {
        loadedResources++;
        targetProgress = 100;
    });

    // Fallback: máximo 10 segundos de espera
    setTimeout(() => {
        if (!loadingComplete) {
            targetProgress = 100;
        }
    }, 10000);
})();
</script>
<script>

// =================== SPEECH & MOOD ===================
function oppSay(cat) {
    const lines = LINES[cat];

    const line = lines[Math.floor(Math.random() * lines.length)];
    const b = document.getElementById('speechBubble');

}

function setMood(mood) {

}

// =================== GAME STATE =====================
const GAME_STORAGE_KEY = `trucoGame_${rivalId}`;

function saveGameState() {
    const state = {
        playerScore,
        cpuScore,
        rivalId,
        timestamp: Date.now()
    };
    localStorage.setItem(GAME_STORAGE_KEY, JSON.stringify(state));
}

function loadGameState() {
    try {
        const saved = localStorage.getItem(GAME_STORAGE_KEY);
        if (saved) {
            const state = JSON.parse(saved);
            // Solo cargar si es del mismo rival y no es muy viejo (24 horas)
            if (state.rivalId === rivalId && Date.now() - state.timestamp < 86400000) {
                return state;
            }
        }
    } catch (e) {
        console.log('Error loading game state:', e);
    }
    return null;
}

function clearGameState() {
    localStorage.removeItem(GAME_STORAGE_KEY);
}

let playerHand = [];
let cpuHand = [];

let playerScore = 0;
let cpuScore = 0;

let trucoLevel = -1;

function renderMiniCards() {
    // Removed - no longer showing mini cards
}

function renderHands() {

    document.getElementById('playerHand').innerHTML = playerHand.map(c => renderCard(c, canPlay)).join('');
    renderMiniCards();
    if (canPlay) setupDragDrop();
}

// ================ GSAP DRAG & THROW ========================
let activeDraggables = [];
let cardZIndex = 10;

function setupDragDrop() {
    // Kill existing draggables
    activeDraggables.forEach(d => d.kill());
    activeDraggables = [];

    const cards = document.querySelectorAll('#playerHand .card.playable');
    const playZone = document.getElementById('playZone');
    const pile = document.getElementById('cardPile');

    cards.forEach(card => {
        const draggable = Draggable.create(card, {
            type: 'x,y',
            inertia: true,
            bounds: document.body,
            edgeResistance: 0.65,
            onDragStart: function() {
                this.target.classList.add('dragging');
                gsap.to(this.target, { scale: 1.15, rotation: 8, duration: 0.2 });
            },
            onDrag: function() {
                // Check if over play zone
                const cardRect = this.target.getBoundingClientRect();
                const pileRect = pile.getBoundingClientRect();
                const isOverPile = (
                    cardRect.left < pileRect.right &&
                    cardRect.right > pileRect.left &&
                    cardRect.top < pileRect.bottom &&
                    cardRect.bottom > pileRect.top
                );
                pile.classList.toggle('highlight', isOverPile);
            },
            onDragEnd: function() {
                this.target.classList.remove('dragging');
                pile.classList.remove('highlight');

                // Check if thrown into play zone
                const cardRect = this.target.getBoundingClientRect();
                const pileRect = pile.getBoundingClientRect();
                const isOverPile = (
                    cardRect.left < pileRect.right &&
                    cardRect.right > pileRect.left &&
                    cardRect.top < pileRect.bottom &&
                    cardRect.bottom > pileRect.top
                );

                if (isOverPile) {
                    const key = this.target.dataset.key;
                    if (key) {
                        // Animate card flying to pile center
                        const pileCenter = {
                            x: pileRect.left + pileRect.width / 2,
                            y: pileRect.top + pileRect.height / 2
                        };
                        gsap.to(this.target, {
                            x: 0, y: 0, scale: 1, rotation: 0,
                            duration: 0.15,
                            onComplete: () => playCard(key)
                        });
                    }
                } else {
                    // Snap back to hand position
                    gsap.to(this.target, {
                        x: 0, y: 0, scale: 1, rotation: 0,
                        duration: 0.4,
                        ease: 'elastic.out(1, 0.5)'
                    });
                }
            }
        })[0];

        activeDraggables.push(draggable);

        // Double-tap/click to play instantly
        card.addEventListener('dblclick', () => {
            const key = card.dataset.key;
            if (key) playCard(key);
        });
    });
}

// Throw card into pile with physics
function throwCardToPile(cardEl, isPlayer) {
    const pile = document.getElementById('cardPile');
    const randomX = (Math.random() - 0.5) * 60;
    const randomY = (Math.random() - 0.5) * 40;
    const randomRot = (Math.random() - 0.5) * 25;

    cardZIndex++;
    cardEl.style.zIndex = cardZIndex;
    cardEl.classList.add(isPlayer ? 'player-card' : 'cpu-card');

    pile.appendChild(cardEl);

    // Animate from off-screen
    const startY = isPlayer ? 200 : -200;
    const startRot = isPlayer ? 15 : -15;

    gsap.fromTo(cardEl,
        { y: startY, x: 0, rotation: startRot, scale: 0.8, opacity: 0 },
        {
            y: randomY,
            x: randomX,
            rotation: randomRot,
            scale: 1,
            opacity: 1,
            duration: 0.4,
            ease: 'power2.out'
        }
    );

    // Play sound
    if (window.audioManager) {
        window.audioManager.play('card-play');
    }
}

    document.getElementById('cardPile').innerHTML = '';
    document.getElementById('roundBadges').innerHTML = '';
    cardZIndex = 10;

    document.getElementById('envidoReveal').classList.remove('show');

    // Animate card dealing
    const handContainer = document.getElementById('playerHand');
    const canPlay = true;
    handContainer.innerHTML = '';

    // Deal cards with stagger animation
    playerHand.forEach((card, i) => {
        setTimeout(() => {
            const cardEl = document.createElement('div');
            cardEl.innerHTML = renderCard(card, canPlay);
            const actualCard = cardEl.firstElementChild;
            actualCard.classList.add('card-dealing', 'will-animate');
            handContainer.appendChild(actualCard);

            // Play deal sound
            if (window.audioManager) {
                window.audioManager.play('card-deal', 0.5);
            }

            // Setup card tilt after animation
            setTimeout(() => {
                actualCard.classList.remove('card-dealing');
                actualCard.classList.add('card-interactive');
                if (window.animationController) {
                    window.animationController.setupCardTilt(actualCard);
                }
                // Setup drag/drop for this card
                setupDragDrop();
            }, 400);
        }, i * 180);
    });

    renderMiniCards();
    renderScores();
    setTimeout(() => renderActions(), 600);
    setMsg('ELEGI UNA CARTA');
    setMood(null);
    oppSay('start');

    // CPU might call envido first
    const cpuEnv = calcEnvido(cpuHand);
    const variance = AI.randomVariance ? (Math.random() * AI.randomVariance * 2 - AI.randomVariance) : 0;
    if (cpuEnv >= (AI.envidoCallThresholdHigh + variance) && Math.random() < AI.envidoCallChanceHigh) {
        setTimeout(() => { cpuCallEnvido(cpuEnv >= 31 ? 2 : 0); }, 800);
    } else if (cpuEnv >= (AI.envidoCallThresholdLow + variance) && Math.random() < AI.envidoCallChanceLow) {
        setTimeout(() => { cpuCallEnvido(0); }, 800);
    }
}

// ================ PLAY CARD ==========================
function playCard(key) {
    if (!playerTurn || waitingForTruco || waitingForEnvido || handOver) return;

    const idx = playerHand.findIndex(c => c.key === key);
    if (idx === -1) return;

    const card = playerHand[idx];
    playerHand = playerHand.filter((_, i) => i !== idx);

    if (!firstCardPlayed) firstCardPlayed = true;

    // Play card sound
    if (window.audioManager) {
        window.audioManager.play('card-play');
    }

    // Small particle effect on card play
    if (window.particleSystem) {
        const pile = document.getElementById('cardPile');
        const rect = pile.getBoundingClientRect();
        window.particleSystem.burst('cardPlay', rect.left + rect.width / 2, rect.top + rect.height / 2);
    }

    placeCard(card, 'player');
    playerTurn = false;
    renderHands();
    renderActions();

    // Si la CPU ya tiró primero, resolvemos la ronda directamente
    if (cpuFirstCard) {
        const cpuCard = cpuFirstCard;
        cpuFirstCard = null;
        setTimeout(() => { resolveRound(card, cpuCard); }, 400);
        return;
    }

    setMsg(`${OPP.name} PIENSA...`);

    // Show thinking animation
    if (window.animationController) {
        const nameEl = document.getElementById('oppName');
        window.animationController.showThinking(nameEl);
    }

    // CPU might call envido after seeing first card
    if (!envidoResolved && currentRound === 0 && roundResults.length === 0) {
        const cpuEnv = calcEnvido(cpuHand);
        const variance = AI.randomVariance ? (Math.random() * AI.randomVariance * 2 - AI.randomVariance) : 0;
        if (cpuEnv >= (AI.envidoCallThresholdLow + 1 + variance) && Math.random() < 0.4) {
            setTimeout(() => {
                pendingPlayerCard = card;
                cpuCallEnvido(cpuEnv >= 30 ? 1 : 0);
            }, 500);
            return;
        }
    }

    setTimeout(() => { cpuPlayCard(card); }, 500 + Math.random() * 600);
}

function cpuPlayCard(playerCard) {
    if (handOver) return;

    // Hide thinking animation
    if (window.animationController) {
        window.animationController.hideThinking();
    }

    const chosen = cpuSelectCard(cpuHand, playerCard, AI.cardStrategy, roundResults);
    const pp = getPower(playerCard);
    const cp = getPower(chosen);

    // Maybe call truco before playing
    if (trucoLevel < 2 && trucoCaller !== 'cpu') {
        const variance = AI.randomVariance ? (Math.random() * AI.randomVariance * 2 - AI.randomVariance) : 0;
        if (cp > pp && cp >= (AI.trucoProactiveMinPower + variance) && Math.random() < AI.trucoProactiveChance) {
            pendingPlayerCard = playerCard;
            cpuCallTruco();
            return;
        }
        if (cp <= pp && Math.random() < AI.trucoBluffChance) {
            pendingPlayerCard = playerCard;
            cpuCallTruco();
            return;
        }
    }

    cpuHand = cpuHand.filter(c => c.key !== chosen.key);
    placeCard(chosen, 'cpu');
    renderMiniCards();

    setTimeout(() => { resolveRound(playerCard, chosen); }, 400);
}

// CPU plays first (when CPU won the previous round)
let cpuFirstCard = null;

function cpuPlaysFirst() {
    if (handOver) return;

    // CPU selects a card without knowing player's card
    // Use a more aggressive strategy when playing first
    const chosen = cpuSelectCardFirst(cpuHand, AI.cardStrategy, roundResults);

    // Maybe call truco before playing
    if (trucoLevel < 2 && trucoCaller !== 'cpu') {
        const cp = getPower(chosen);
        const variance = AI.randomVariance ? (Math.random() * AI.randomVariance * 2 - AI.randomVariance) : 0;
        if (cp >= (AI.trucoProactiveMinPower + variance) && Math.random() < AI.trucoProactiveChance) {
            cpuFirstCard = chosen;
            cpuCallTruco();
            return;
        }
    }

    cpuHand = cpuHand.filter(c => c.key !== chosen.key);
    placeCard(chosen, 'cpu');
    renderMiniCards();
    cpuFirstCard = chosen;

    // Now player must respond
    setTimeout(() => {
        playerTurn = true;
        setMsg('ELEGI UNA CARTA PARA RESPONDER');
        renderHands();
        renderActions();
    }, 400);
}

// CPU selects a card when playing first (doesn't know player's card)
function cpuSelectCardFirst(hand, strategy, results) {
    // Simple strategy: play middle card when going first
    // Save the best for later, don't waste it
    const sorted = [...hand].sort((a, b) => getPower(a) - getPower(b));

    if (strategy === 'aggressive' || results.filter(r => r === 'cpu').length > 0) {
        // If already winning or aggressive, play strong
        return sorted[sorted.length - 1];
    } else if (strategy === 'conservative') {
        // Play weakest first
        return sorted[0];
    } else {
        // Default: play middle card
        return sorted[Math.floor(sorted.length / 2)];
    }
}

// ================ RESOLVE ROUND ======================
function resolveRound(pCard, cCard) {
    const pp = getPower(pCard);
    const cp = getPower(cCard);

    let result = pp > cp ? 'player' : cp > pp ? 'cpu' : 'tie';
    roundResults.push(result);

    addRoundBadge(null, result === 'player' ? 'win' : result === 'cpu' ? 'lose' : 'tie');

    if (result === 'player') {
        oppSay('loseRound');
        setMood('angry');
        if (window.audioManager) window.audioManager.play('win-round');
        if (window.particleSystem) window.particleSystem.burst('winRound');
    }
    else if (result === 'cpu') {
        oppSay('winRound');
        setMood('happy');
        if (window.audioManager) window.audioManager.play('lose-round');
    }

    const pWins = roundResults.filter(r => r === 'player').length;
    const cWins = roundResults.filter(r => r === 'cpu').length;

    let winner = null;

    if (pWins >= 2) winner = 'player';
    else if (cWins >= 2) winner = 'cpu';
    else if (currentRound === 2) {
        if (pWins > cWins) winner = 'player';
        else if (cWins > pWins) winner = 'cpu';
        else {
            if (roundResults[0] === 'player') winner = 'player';
            else if (roundResults[0] === 'cpu') winner = 'cpu';
            else winner = 'player';
        }
    } else if (currentRound === 1 && roundResults[0] === 'tie' && result === 'tie') {
        winner = 'player';
    }

    if (winner) {
        setTimeout(() => { endHand(winner); }, 500);
    } else {
        currentRound++;
        cpuCardPlacedThisRound = false;

        // El que gana la mano tira primero en la siguiente
        // Si hay empate, sigue tirando el mismo que tiró primero antes
        const nextStarter = result === 'tie' ? 'player' : result === 'player' ? 'player' : 'cpu';

        setTimeout(() => {
            setMood(null);
            envidoResolved = true;

            if (nextStarter === 'player') {
                playerTurn = true;
                setMsg('ELEGI UNA CARTA');
                renderHands();
                renderActions();
            } else {
                // CPU ganó la mano anterior, tira primero
                playerTurn = false;
                setMsg(`${OPP.name} TIRA PRIMERO...`);
                renderHands();
                renderActions();

                // CPU juega su carta primero
                setTimeout(() => { cpuPlaysFirst(); }, 500 + Math.random() * 600);
            }
        }, 600);
    }
}

// ================ END HAND ===========================
function endHand(winner) {
    handOver = true;
    const q = winner === 'cpu' ? oppSay('winHand') : oppSay('loseHand');

    if (winner === 'player') {
        playerScore += handPoints;
        setMood('angry');
        showOverlay('\u00a1GANASTE!', `+${handPoints} pts truco${envidoPoints > 0 ? ` | +${envidoPoints} pts envido previos` : ''}`, false, q);

        // Victory celebration
        if (window.animationController) {
            window.animationController.celebrate(true);
        }
        if (window.particleSystem) {
            window.particleSystem.burst('victory');
        }
    } else {
        cpuScore += handPoints;
        setMood('happy');
        showOverlay('PERDISTE', `${OPP.name} +${handPoints} pts${envidoPoints > 0 ? ` | envido ya contado` : ''}`, true, q);

        // Defeat animation
        if (window.animationController) {
            window.animationController.celebrate(false);
        }
    }
    renderScores();
    renderHands();
    renderActions();
    checkGameEnd();
}

function checkGameEnd() {
    if (playerScore >= 15 || cpuScore >= 15) {
        const gw = playerScore >= 15 ? 'player' : 'cpu';
        setTimeout(() => {
            const q = gw === 'cpu' ? oppSay('winGame') : oppSay('loseGame');

            if (gw === 'player') {
                // Tower mode: save victory and progress to next rival
                saveTowerVictory(rivalId);
                saveTrucoVictory(rivalId); // Also keep all-time stats
                clearGameState(); // Limpiar partida guardada

                showOverlay(
                    '\u00a1PARTIDA GANADA!',
                    `Derrotaste a ${OPP.name}`,
                    false, q
                );
                document.getElementById('overlayBtn').textContent = 'SIGUIENTE RIVAL';
                document.getElementById('overlayBtn').onclick = () => { window.location.href = './'; };
            } else {
                // Tower mode: LOSE = reset all tower progress
                resetTowerProgress();
                clearGameState(); // Limpiar partida guardada

                showOverlay(
                    'PARTIDA PERDIDA',
                    `${OPP.name} te destruy\u00f3. Volv\u00e9s al inicio de la torre.`,
                    true, q
                );
                document.getElementById('overlayBtn').textContent = 'VOLVER A LA TORRE';
                document.getElementById('overlayBtn').onclick = () => { window.location.href = './'; };
            }
        }, 1200);
    }
}

// ================ ENVIDO ============================
function callEnvido(level) {
    if (envidoResolved) return;
    envidoLevel = level;
    envidoCaller = 'player';
    envidoChain.push(level);

    // Show dramatic call
    const callType = level === 0 ? 'envido' : level === 1 ? 'real-envido' : 'falta-envido';
    if (window.animationController) {
        window.animationController.showCall(ENVIDO_LEVELS[level].name, callType);
    }
    if (window.particleSystem) {
        window.particleSystem.burst('envidoCall');
    }

    setMsg(`\u00a1CANTASTE ${ENVIDO_LEVELS[level].name}!`);
    renderActions();
    setTimeout(() => { cpuRespondEnvido(); }, 1800 + Math.random() * 500);
}

function cpuCallEnvido(level) {
    if (envidoResolved) return;
    envidoLevel = level;
    envidoCaller = 'cpu';
    waitingForEnvido = true;
    envidoChain.push(level);

    const cat = level === 0 ? 'envido' : level === 1 ? 'realEnvido' : 'faltaEnvido';
    const callType = level === 0 ? 'envido' : level === 1 ? 'real-envido' : 'falta-envido';

    // Show dramatic call
    if (window.animationController) {
        window.animationController.showCall(ENVIDO_LEVELS[level].name, callType);
    }
    if (window.particleSystem) {
        window.particleSystem.burst('envidoCall');
    }

    setTimeout(() => {
        oppSay(cat);
        setMood('happy');
        setMsg(`${OPP.name} CANTA ${ENVIDO_LEVELS[level].name}!`);
        renderHands();
        renderActions();
    }, 1200);
}

function respondEnvido(accept) {
    waitingForEnvido = false;

    if (accept) {
        setMsg('\u00a1QUIERO!');
        setTimeout(() => { resolveEnvido(); }, 500);
    } else {
        setMsg('NO QUIERO...');
        const pts = calcEnvidoNoQuieroPoints();
        cpuScore += pts;
        envidoResolved = true;
        renderScores();
        oppSay('envidoWin');
        setMood('happy');
        setTimeout(() => {
            setMsg(`${OPP.name} +${pts} PTS ENVIDO`);
            setTimeout(() => { resumeAfterEnvido(); }, 800);
        }, 400);
    }
}

function raiseEnvido(level) {
    waitingForEnvido = false;
    envidoLevel = level;
    envidoCaller = 'player';
    envidoChain.push(level);
    setMsg(`\u00a1${ENVIDO_LEVELS[level].name}!`);
    setTimeout(() => { cpuRespondEnvido(); }, 600 + Math.random() * 500);
}

function cpuRespondEnvido() {
    const cpuEnv = calcEnvido(cpuHand);
    const variance = AI.randomVariance ? (Math.random() * AI.randomVariance * 2 - AI.randomVariance) : 0;
    const threshold = (envidoLevel === 2 ? AI.envidoAcceptThreshold + 4 : envidoLevel === 1 ? AI.envidoAcceptThreshold + 2 : AI.envidoAcceptThreshold) + variance;
    const accept = cpuEnv >= threshold || Math.random() < (1 - AI.foldChance);

    if (accept) {
        if (envidoLevel < 2 && cpuEnv >= (AI.envidoRaiseThreshold + variance) && Math.random() < AI.envidoRaiseChance) {
            const newLevel = envidoLevel + 1;
            envidoLevel = newLevel;
            envidoCaller = 'cpu';
            waitingForEnvido = true;
            envidoChain.push(newLevel);
            const cat = newLevel === 1 ? 'realEnvido' : 'faltaEnvido';
            oppSay(cat);
            setMood('happy');
            setMsg(`${OPP.name} CANTA ${ENVIDO_LEVELS[newLevel].name}!`);
            renderHands();
            renderActions();
            return;
        }

        oppSay('envidoQuiero');
        setMsg(`${OPP.name}: \u00a1QUIERO!`);
        setTimeout(() => { resolveEnvido(); }, 600);
    } else {
        oppSay('envidoNoQuiero');
        setMood('angry');
        const pts = calcEnvidoNoQuieroPoints();
        playerScore += pts;
        envidoResolved = true;
        renderScores();
        setTimeout(() => {
            setMsg(`VOS +${pts} PTS ENVIDO`);
            setTimeout(() => { resumeAfterEnvido(); }, 800);
        }, 400);
    }
}

function calcEnvidoNoQuieroPoints() {
    if (envidoChain.length <= 1) return 1;
    let pts = 0;
    for (let i = 0; i < envidoChain.length - 1; i++) {
        const lvl = envidoChain[i];
        pts += lvl === 0 ? 2 : lvl === 1 ? 3 : 0;
    }
    return Math.max(pts, 1);
}

function calcEnvidoWinPoints() {
    let pts = 0;
    for (const lvl of envidoChain) {
        if (lvl === 0) pts += 2;
        else if (lvl === 1) pts += 3;
        else if (lvl === 2) {
            const gap = 15 - Math.min(playerScore, cpuScore);
            pts += Math.max(gap, 1);
        }
    }
    return Math.max(pts, 2);
}

function resolveEnvido() {
    const pEnv = calcEnvido(originalPlayerHand);
    const cEnv = calcEnvido(originalCpuHand);

    const reveal = document.getElementById('envidoReveal');
    reveal.classList.add('show');

    const pEl = document.getElementById('envidoPlayerPts');
    const cEl = document.getElementById('envidoCpuPts');

    pEl.textContent = pEnv;
    cEl.textContent = cEnv;

    const winner = pEnv >= cEnv ? 'player' : 'cpu';
    pEl.className = `envido-points-value ${winner === 'player' ? 'envido-win' : 'envido-lose'}`;
    cEl.className = `envido-points-value ${winner === 'cpu' ? 'envido-win' : 'envido-lose'}`;

    const pts = calcEnvidoWinPoints();
    envidoPoints = pts;

    if (winner === 'player') {
        playerScore += pts;
        oppSay('envidoLose');
        setMood('angry');
        setMsg(`\u00a1GANASTE EL ENVIDO! +${pts} PTS`);
    } else {
        cpuScore += pts;
        oppSay('envidoWin');
        setMood('happy');
        setMsg(`${OPP.name} GANA ENVIDO +${pts} PTS`);
    }

    envidoResolved = true;
    renderScores();

    setTimeout(() => {
        reveal.classList.remove('show');
        resumeAfterEnvido();
    }, 2000);
}

function resumeAfterEnvido() {
    setMood(null);
    playerTurn = true;

    if (pendingPlayerCard) {
        const pc = pendingPlayerCard;
        pendingPlayerCard = null;
        setMsg(`${OPP.name} PIENSA...`);
        playerTurn = false;
        renderHands();
        renderActions();
        setTimeout(() => { cpuPlayCard(pc); }, 500);
    } else {
        setMsg('ELEGI UNA CARTA');
        renderHands();
        renderActions();
    }
    checkGameEnd();
}

// ================ TRUCO =============================
function callTruco() {
    const next = trucoLevel + 1;
    if (next > 2) return;
    trucoLevel = next;
    trucoCaller = 'player';

    // Show dramatic call
    const callType = trucoLevel === 0 ? 'truco' : trucoLevel === 1 ? 'retruco' : 'vale-cuatro';
    if (window.animationController) {
        window.animationController.showCall(TRUCO_LEVELS[trucoLevel].name, callType);

    renderActions();
    setTimeout(() => { cpuRespondTruco(); }, 1800 + Math.random() * 500);
}

function cpuCallTruco() {
    const next = trucoLevel + 1;
    if (next > 2) return;
    trucoLevel = next;
    trucoCaller = 'cpu';
    waitingForTruco = true;

    const cat = trucoLevel === 0 ? 'truco' : trucoLevel === 1 ? 'retruco' : 'valeCuatro';
    const callType = trucoLevel === 0 ? 'truco' : trucoLevel === 1 ? 'retruco' : 'vale-cuatro';

    // Show dramatic call
    if (window.animationController) {
        window.animationController.showCall(TRUCO_LEVELS[trucoLevel].name, callType);
    }
    if (window.particleSystem) {
        window.particleSystem.burst('trucoCall');
    }

    setTimeout(() => {
        oppSay(cat);
        setMood('happy');
        setMsg(`${OPP.name} CANTA ${TRUCO_LEVELS[trucoLevel].name}!`);

        renderActions();
    }, 1200);
}

function respondTruco(accept) {
    waitingForTruco = false;

    if (accept) {
        handPoints = TRUCO_LEVELS[trucoLevel].points;

        // Show QUIERO animation
        if (window.animationController) {
            window.animationController.showCall('\u00a1QUIERO!', 'quiero');
        }
        if (window.audioManager) {
            window.audioManager.play('button-click');
        }

        setMsg('\u00a1QUIERO!');
        setTimeout(() => {
            setMood(null);

            // Si la CPU cantó truco mientras tiraba primero, ahora tira su carta
            if (cpuFirstCard && !cpuCardPlacedThisRound) {
                cpuCardPlacedThisRound = true;
                const chosen = cpuFirstCard;
                cpuHand = cpuHand.filter(c => c.key !== chosen.key);
                placeCard(chosen, 'cpu');
                renderMiniCards();

                // Ahora el jugador responde
                setTimeout(() => {
                    playerTurn = true;
                    setMsg('ELEGI UNA CARTA PARA RESPONDER');
                    renderHands();
                    renderActions();
                }, 400);
                return;
            }

            playerTurn = true;
            setMsg('ELEGI UNA CARTA');
            renderHands();
            renderActions();

            if (pendingPlayerCard) {
                const pc = pendingPlayerCard;
                pendingPlayerCard = null;
                playerTurn = false;
                setMsg(`${OPP.name} PIENSA...`);
                renderHands();
                renderActions();
                setTimeout(() => { cpuPlayCard(pc); }, 500);
            }
        }, 500);
    } else {
        setMsg('NO QUIERO...');
        setTimeout(() => { endHand('cpu'); }, 600);
    }
}

function raiseTruco() {
    waitingForTruco = false;
    trucoLevel++;
    trucoCaller = 'player';
    setMsg(`\u00a1${TRUCO_LEVELS[trucoLevel].name}!`);
    renderActions();
    setTimeout(() => { cpuRespondTruco(); }, 600 + Math.random() * 500);
}

function cpuRespondTruco() {
    const maxP = Math.max(...cpuHand.map(getPower));
    const variance = AI.randomVariance ? (Math.random() * AI.randomVariance * 2 - AI.randomVariance) : 0;
    const accept = maxP >= (AI.trucoAcceptMinPower + variance) || Math.random() < (1 - AI.foldChance);

    if (accept) {
        if (trucoLevel < 2 && maxP >= (AI.trucoRaiseMinPower + variance) && Math.random() < AI.trucoRaiseChance) {
            trucoLevel++;
            trucoCaller = 'cpu';
            waitingForTruco = true;
            const cat = trucoLevel === 1 ? 'retruco' : 'valeCuatro';
            oppSay(cat);
            setMood('happy');
            setMsg(`${OPP.name} CANTA ${TRUCO_LEVELS[trucoLevel].name}!`);
            renderHands();
            renderActions();
            return;
        }

        handPoints = TRUCO_LEVELS[trucoLevel].points;
        oppSay('trucoQuiero');
        setMsg(`${OPP.name}: \u00a1QUIERO!`);
        setTimeout(() => {
            setMsg('ELEGI UNA CARTA');
            setMood(null);
            renderActions();
        }, 600);
    } else {
        oppSay('trucoNoQuiero');
        setMood('angry');
        setMsg(`${OPP.name}: NO QUIERO`);
        setTimeout(() => { endHand('player'); }, 600);
    }
}

// Initialize audio and animation systems
async function initSystems() {
    // Import modules
    await Promise.all([
        import('./js/animations.js'),
        import('./js/audio.js'),
        import('./js/particles.js')
    ]).catch(err => console.log('Module load:', err));

    // Initialize audio
    if (window.audioManager) {
        await window.audioManager.init();
        window.audioManager.setupUI('btnMute', 'volumeSlider');
    }

    // Connect particles to animation controller
    if (window.animationController && window.particleSystem) {
        window.animationController.particles = window.particleSystem;
    }

    // Setup button ripples
    if (window.animationController) {
        window.animationController.setupButtonRipples();
    }

    // Hide loading screen
    setTimeout(() => {
        const loadingScreen = document.getElementById('loadingScreen');
        if (loadingScreen) {
            loadingScreen.classList.add('hidden');
        }
    }, 500);

    // Unlock audio on first interaction
    document.body.addEventListener('click', async () => {
        if (window.audioManager && !window.audioManager.unlocked) {
            await window.audioManager.unlock();
            window.audioManager.playMusic();
        }
    }, { once: true });
}

// Start initialization
initSystems().then(() => {
    // Cargar estado guardado si existe
    const savedState = loadGameState();
    if (savedState) {
        playerScore = savedState.playerScore;
        cpuScore = savedState.cpuScore;
        renderScores();
    }
    deal();
});
</script>

</body>
</html>
