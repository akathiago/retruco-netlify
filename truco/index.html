<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truco — Próximamente | ReTruco</title>
    <meta name="description" content="El Truco de ReTruco está por llegar. Muy pronto vas a poder jugar una.">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Truco — Próximamente | ReTruco">
    <meta property="og:description" content="¿Querías jugar una? Ya se viene. Muy pronto vas a poder cantar Truco.">
    <meta property="og:image" content="https://retruco.xyz/assets/imagenes/trailer-miniatura.png">
    <meta property="og:url" content="https://retruco.xyz/truco/">
    <meta property="og:locale" content="es_AR">
    <meta property="og:site_name" content="ReTruco">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Truco — Próximamente | ReTruco">
    <meta name="twitter:description" content="¿Querías jugar una? Ya se viene.">
    <meta name="twitter:image" content="https://retruco.xyz/assets/imagenes/trailer-miniatura.png">

    <link rel="canonical" href="https://retruco.xyz/truco/">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon/favicon-32x32.png">
    <link rel="shortcut icon" href="../favicon/favicon.ico">
    <link rel="apple-touch-icon" href="../favicon/apple-touch-icon.png">
    <meta name="theme-color" content="#071820">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;900&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Trevor';
            src: url('../assets/fuentes/TREVOR.TTF') format('truetype');
            font-weight: bold;
            font-display: swap;
        }

        :root {
            --ink: #071820;
            --deep: #0a2630;
            --cyan: #2bb8cd;
            --paper: #e9fbfc;
            --yellow: #f5d547;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            min-height: 100svh;
            overflow: hidden;
            display: grid;
            place-items: center;
            padding: 28px 20px;
            color: var(--paper);
            background:
                radial-gradient(circle at 50% 28%, rgba(43, 184, 205, .2), transparent 34rem),
                linear-gradient(155deg, var(--deep), var(--ink) 62%);
            font-family: 'Montserrat', sans-serif;
            text-align: center;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            opacity: .055;
            pointer-events: none;
            background-image: repeating-linear-gradient(45deg, transparent 0 34px, var(--cyan) 35px 36px);
        }

        .suit {
            position: fixed;
            color: rgba(43, 184, 205, .09);
            font-family: Georgia, serif;
            font-size: clamp(7rem, 18vw, 16rem);
            line-height: 1;
            user-select: none;
        }

        .suit-one { top: -3rem; left: -1rem; transform: rotate(-18deg); }
        .suit-two { right: -1rem; bottom: -3rem; transform: rotate(15deg); }

        main {
            position: relative;
            z-index: 1;
            width: min(660px, 100%);
        }

        .logo {
            width: min(270px, 70vw);
            height: auto;
            margin-bottom: 30px;
            filter: drop-shadow(0 12px 24px rgba(0, 0, 0, .35));
            animation: float 3.5s ease-in-out infinite;
        }

        .eyebrow {
            display: inline-block;
            margin-bottom: 12px;
            padding: 7px 13px 6px;
            border: 2px solid var(--cyan);
            color: var(--cyan);
            font-size: .72rem;
            font-weight: 900;
            letter-spacing: .22em;
            text-transform: uppercase;
            transform: rotate(-1deg);
        }

        h1 {
            margin-bottom: 25px;
            color: var(--cyan);
            font-family: 'Trevor', sans-serif;
            font-size: clamp(4.5rem, 17vw, 9.5rem);
            font-weight: 700;
            letter-spacing: .04em;
            line-height: .82;
            text-shadow: 5px 6px 0 var(--ink), 8px 9px 0 rgba(43, 184, 205, .22);
        }

        .message-card {
            position: relative;
            margin: 0 auto 34px;
            padding: 27px 34px 29px;
            border: 4px solid var(--ink);
            color: var(--ink);
            background: var(--paper);
            box-shadow: 9px 9px 0 var(--cyan);
            transform: rotate(-1.2deg);
        }

        .message-card::before {
            content: '';
            position: absolute;
            top: -13px;
            left: 50%;
            width: 22px;
            height: 22px;
            border: 3px solid var(--ink);
            border-radius: 50%;
            background: var(--yellow);
            box-shadow: 2px 2px 0 var(--ink);
            transform: translateX(-50%);
        }

        .message-main {
            margin-bottom: 10px;
            font-family: 'Trevor', sans-serif;
            font-size: clamp(1.35rem, 5vw, 2rem);
            letter-spacing: .08em;
            line-height: 1.15;
        }

        .message-sub {
            max-width: 470px;
            margin: auto;
            color: #33464b;
            font-size: clamp(.9rem, 2.7vw, 1rem);
            font-weight: 600;
            line-height: 1.6;
        }

        .message-sub strong { color: var(--ink); font-weight: 900; }

        .back-link {
            display: inline-block;
            padding: 17px 37px;
            border: 4px solid var(--cyan);
            color: #fff;
            background: #182b4c;
            box-shadow: 6px 6px 0 var(--cyan);
            font-family: 'Trevor', sans-serif;
            font-size: clamp(1rem, 3vw, 1.25rem);
            letter-spacing: .16em;
            text-decoration: none;
            transition: transform .18s ease, box-shadow .18s ease;
        }

        .back-link:hover,
        .back-link:focus-visible {
            outline: none;
            transform: translate(-3px, -3px);
            box-shadow: 9px 9px 0 var(--cyan);
        }

        .back-link:active {
            transform: translate(2px, 2px);
            box-shadow: 3px 3px 0 var(--cyan);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-1deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }

        @media (max-width: 520px) {
            .logo { margin-bottom: 23px; }
            .message-card { padding: 24px 20px 25px; box-shadow: 7px 7px 0 var(--cyan); }
            .back-link { padding: 15px 27px; }
        }

        @media (prefers-reduced-motion: reduce) {
            .logo { animation: none; }
            .back-link { transition: none; }
        }
    </style>
</head>
<body>
    <span class="suit suit-one" aria-hidden="true">♠</span>
    <span class="suit suit-two" aria-hidden="true">♦</span>

    <main>
        <img src="../assets/imagenes/logoretruco.png" alt="ReTruco" class="logo">
        <div class="eyebrow">Mesa en preparación</div>
        <h1>TRUCO</h1>

        <div class="message-card">
            <p class="message-main">EPA, PIBE… ¿QUERÍAS JUGAR UNA?</p>
            <p class="message-sub">Ya se viene. Dentro de poco vas a poder sentarte a la mesa y cantar <strong>TRUCO</strong>. Muy próximamente.</p>
        </div>

        <a href="../" class="back-link">VOLVER AL BARRIO</a>
    </main>
</body>
</html>
