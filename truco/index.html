<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ReTruco - Elegi tu Rival</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon/favicon-32x32.png">
    <link rel="shortcut icon" href="../favicon/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Trevor';
            src: url('../fuentes/TREVOR.TTF') format('truetype');
            font-weight: bold;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --rust: #2bb8cd;
            --paper: #e0f7fa;
            --ink: #0a1a24;
            --bg: #0d2233;
            --gold: #c9a227;
            --red: #e74c3c;
            --green: #2ecc71;
        }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(43,184,205,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(43,184,205,0.05) 0%, transparent 60%);
            color: var(--paper);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* ====== HEADER ====== */
        .sel-header {
            width: 100%;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
            border-bottom: 2px solid rgba(43,184,205,0.15);
        }

        .sel-logo { height: 28px; filter: drop-shadow(0 0 8px rgba(43,184,205,0.3)); }

        .sel-back {
            color: var(--rust);
            text-decoration: none;
            font-family: 'Trevor', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 2px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .sel-back:hover { opacity: 1; }

        /* ====== TITLE ====== */
        .sel-title {
            font-family: 'Trevor', sans-serif;
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            letter-spacing: 5px;
            text-align: center;
            padding: 20px 0 5px;
            color: var(--rust);
            text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
        }

        .sel-subtitle {
            text-align: center;
            font-size: 0.75rem;
            color: rgba(224,247,250,0.4);
            letter-spacing: 2px;
            padding-bottom: 20px;
        }

        /* ====== GRID ====== */
        .rival-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
            max-width: 700px;
            margin: 0 auto;
            padding: 0 20px 30px;
        }

        .rival-card {
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(43,184,205,0.15);
            border-radius: 12px;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
        }

        .rival-card:hover {
            transform: translateY(-4px);
            border-color: var(--card-color, var(--rust));
            box-shadow: 0 8px 25px rgba(0,0,0,0.4), 0 0 15px rgba(43,184,205,0.15);
        }

        .rival-card:active {
            transform: translateY(0);
        }

        .rival-card.locked {
            cursor: default;
            opacity: 0.4;
            filter: grayscale(0.7);
        }

        .rival-card.locked:hover {
            transform: none;
            border-color: rgba(43,184,205,0.15);
            box-shadow: none;
        }

        .rival-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 3px solid var(--card-color, var(--rust));
            object-fit: cover;
            object-position: top;
            box-shadow: 0 0 12px rgba(0,0,0,0.4);
            transition: box-shadow 0.2s;
        }

        .rival-card:hover .rival-avatar {
            box-shadow: 0 0 20px rgba(43,184,205,0.3);
        }

        .rival-avatar.placeholder {
            filter: brightness(0.15) contrast(0.8);
            background: var(--ink);
        }

        .rival-name {
            font-family: 'Trevor', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: var(--card-color, var(--rust));
            text-align: center;
        }

        .rival-role {
            font-size: 0.6rem;
            color: rgba(224,247,250,0.4);
            text-align: center;
            letter-spacing: 1px;
        }

        .rival-difficulty {
            display: flex;
            gap: 3px;
        }

        .diff-skull {
            font-size: 0.6rem;
            opacity: 0.8;
        }

        .diff-skull.empty {
            opacity: 0.15;
        }

        .rival-lock {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 1rem;
            opacity: 0.5;
        }

        .rival-wins {
            font-size: 0.55rem;
            color: var(--green);
            letter-spacing: 1px;
        }

        /* ====== TIER LABEL ====== */
        .tier-label {
            max-width: 700px;
            margin: 10px auto 8px;
            padding: 0 20px;
            font-family: 'Trevor', sans-serif;
            font-size: 0.55rem;
            letter-spacing: 3px;
            color: rgba(224,247,250,0.2);
        }

        /* ====== TUTORIAL BUTTON ====== */
        .tutorial-section {
            text-align: center;
            padding: 10px 20px 30px;
        }

        .btn-tutorial {
            font-family: 'Trevor', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 3px;
            padding: 12px 30px;
            border: 2px solid rgba(43,184,205,0.3);
            background: rgba(0,0,0,0.3);
            color: var(--rust);
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-tutorial:hover {
            border-color: var(--rust);
            background: rgba(43,184,205,0.08);
            transform: translateY(-2px);
        }

        /* ====== MOBILE ====== */
        @media (max-width: 420px) {
            .rival-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
                padding: 0 12px 20px;
            }
            .rival-avatar { width: 52px; height: 52px; }
            .rival-name { font-size: 0.6rem; }
            .sel-title { padding: 15px 0 5px; }
        }
    </style>
</head>
<body>

    <div class="sel-header">
        <img src="../imagenes/logoretruco.png" alt="ReTruco" class="sel-logo">
        <a href="../index.html" class="sel-back">&larr; VOLVER</a>
    </div>

    <h1 class="sel-title">ELEGI TU RIVAL</h1>
    <p class="sel-subtitle">GANÁ PARA DESBLOQUEAR MÁS RIVALES</p>

    <div id="rivalContainer"></div>

    <div class="tutorial-section">
        <a href="tutorial.html" class="btn-tutorial">&#x1F0CF; TUTORIAL - APRENDE A JUGAR</a>
    </div>

<script src="shared.js"></script>
<script>
const progress = getTrucoProgress();
const highestTier = progress.highestTier || 1;
const victories = progress.victories || {};

// Group opponents by tier
const tiers = {};
for (const [id, opp] of Object.entries(OPPONENTS)) {
    if (!tiers[opp.tier]) tiers[opp.tier] = [];
    tiers[opp.tier].push({ id, ...opp });
}

const tierNames = {
    1: 'EL PATIO',
    2: 'EL PABELLÓN',
    3: 'LA REJA',
    4: 'EL CALABOZO',
    5: 'LA CELDA DEL JEFE'
};

const container = document.getElementById('rivalContainer');

for (let t = 1; t <= 5; t++) {
    const rivals = tiers[t];
    if (!rivals) continue;

    const unlocked = t <= highestTier;

    const label = document.createElement('div');
    label.className = 'tier-label';
    label.textContent = `${unlocked ? '' : '\u{1F512} '}${tierNames[t]}`;
    container.appendChild(label);

    const grid = document.createElement('div');
    grid.className = 'rival-grid';

    for (const rival of rivals) {
        const card = document.createElement(unlocked ? 'a' : 'div');
        card.className = `rival-card${unlocked ? '' : ' locked'}`;
        if (unlocked) card.href = `juego.html?rival=${rival.id}`;
        card.style.setProperty('--card-color', rival.color);

        const wins = victories[rival.id] || 0;

        // Determine portrait
        let portraitSrc = rival.portrait;
        let isPlaceholder = rival.placeholderPortrait;
        // For characters without portraits, use alfredito as silhouette base
        if (isPlaceholder) portraitSrc = '../imagenes/alfredito.png';

        card.innerHTML = `
            ${!unlocked ? '<div class="rival-lock">\u{1F512}</div>' : ''}
            <img src="${portraitSrc}" alt="${rival.name}" class="rival-avatar${isPlaceholder ? ' placeholder' : ''}" onerror="this.classList.add('placeholder')">
            <div class="rival-name">${rival.name}</div>
            <div class="rival-role">${rival.role}</div>
            <div class="rival-difficulty">
                ${Array.from({length: 5}, (_, i) => `<span class="diff-skull ${i < rival.difficulty ? '' : 'empty'}">\u{1F480}</span>`).join('')}
            </div>
            ${wins > 0 ? `<div class="rival-wins">\u2713 ${wins} victoria${wins > 1 ? 's' : ''}</div>` : ''}
        `;

        grid.appendChild(card);
    }

    container.appendChild(grid);
}
</script>

</body>
</html>
