<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#071018">
    <meta name="robots" content="noindex,follow">
    <title>ReTruco — Nuevo juego en camino</title>
    <meta name="description" content="Estamos preparando una nueva versión del juego de Truco de ReTruco.">
    <link rel="canonical" href="https://retruco.xyz/truco/">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon/favicon-32x32.png">
    <style>
        @font-face {
            font-family: "Trevor";
            src: url("../assets/fuentes/Trevor.ttf") format("truetype");
            font-display: swap;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100svh;
            display: grid;
            place-items: center;
            overflow: hidden;
            color: #fff;
            background: #071018;
            font-family: "Trevor", Impact, sans-serif;
        }
        .backdrop, .backdrop img {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
        }
        .backdrop img { object-fit: cover; opacity: .35; filter: saturate(.8) contrast(1.1); }
        .shade { position: fixed; inset: 0; background: linear-gradient(180deg, rgba(4,10,16,.2), #071018 90%); }
        main {
            position: relative;
            width: min(680px, calc(100% - 32px));
            padding: clamp(28px, 7vw, 64px);
            text-align: center;
            background: rgba(8, 18, 27, .9);
            border: 4px solid #2bb8cd;
            box-shadow: 12px 12px 0 #000, 0 0 50px rgba(43,184,205,.25);
            transform: rotate(-1deg);
        }
        .eyebrow { margin: 0 0 12px; color: #2bb8cd; font-size: clamp(.85rem, 2vw, 1rem); letter-spacing: .22em; }
        h1 { margin: 0; font-size: clamp(2.5rem, 9vw, 5.4rem); line-height: .9; text-shadow: 5px 5px 0 #000; }
        p { margin: 24px auto 30px; max-width: 480px; font-family: Arial, sans-serif; font-size: clamp(1rem, 2.6vw, 1.2rem); line-height: 1.55; }
        a {
            display: inline-block;
            padding: 14px 24px;
            color: #071018;
            background: #2bb8cd;
            border: 3px solid #fff;
            box-shadow: 5px 5px 0 #000;
            text-decoration: none;
            letter-spacing: .08em;
            transition: transform .18s ease, box-shadow .18s ease;
        }
        a:hover, a:focus-visible { transform: translate(-2px, -2px); box-shadow: 7px 7px 0 #000; }
        @media (prefers-reduced-motion: reduce) { a { transition: none; } }
    </style>
</head>
<body>
    <picture class="backdrop" aria-hidden="true">
        <source srcset="../assets/imagenes/optimized/trucogang-1920.webp" type="image/webp">
        <img src="../assets/imagenes/trucogang.png" alt="" width="8000" height="4500">
    </picture>
    <div class="shade" aria-hidden="true"></div>
    <main>
        <p class="eyebrow">MESA EN PREPARACIÓN</p>
        <h1>NUEVO TRUCO EN CAMINO</h1>
        <p>Estamos reemplazando el juego anterior por una versión nueva. Esta misma dirección va a volver a abrir la mesa cuando esté lista.</p>
        <a href="../index.html">VOLVER A RETRUCO</a>
    </main>
</body>
</html>
