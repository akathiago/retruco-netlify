<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marquee Retruco - Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Trevor';
            src: url('fuentes/TREVOR.TTF') format('truetype');
            font-weight: bold;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Trevor', 'Montserrat', Impact, sans-serif;
            background: #030a0f;
            padding: 100px 0;
            overflow-x: hidden;
        }

        /* ========== MARQUEE ========== */
        .marquee-container {
            padding: 50px 0;
            position: relative;
        }

        .marquee-shadow {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            transform: translateY(-30%) rotate(3deg) scale(1.03);
            background: #0a1a24;
            padding: 10px 0;
            border: 5px solid #2bb8cd;
            border-left: none;
            border-right: none;
            opacity: 0.3;
            z-index: 1;
        }

        .marquee-wrapper {
            position: relative;
            z-index: 2;
            transform: rotate(-2deg) scale(1.04);
            background: #0a1a24;
            padding: 10px 0;
            border: 5px solid #2bb8cd;
            border-left: none;
            border-right: none;
            overflow: hidden;
            white-space: nowrap;
        }

        .marquee-track {
            display: inline-flex;
            animation: marquee 22s linear infinite;
        }

        .marquee-item {
            display: inline-flex;
            align-items: center;
            gap: 35px;
            padding: 0 35px;
            font-size: 1.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 900;
            color: #e0f7fa;
        }

        .logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
            flex-shrink: 0;
            margin: -30px 0;
        }

        .dot {
            font-size: 1.8rem;
            color: #2bb8cd;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .marquee-wrapper:hover .marquee-track {
            animation-play-state: paused;
        }
    </style>
</head>
<body>

    <div class="marquee-container">
        <div class="marquee-shadow"></div>
        <div class="marquee-wrapper">
            <div class="marquee-track">
                <div class="marquee-item">
                    <img src="imagenes/logoretruco.png" alt="Logo" class="logo">
                    <span class="dot">•</span>
                    <span>RETRUCO</span>
                    <span class="dot">•</span>
                    <img src="imagenes/logoretruco.png" alt="Logo" class="logo">
                    <span class="dot">•</span>
                    <span>UNA HISTORIA BIEN CRIOLLA</span>
                    <span class="dot">•</span>
                    <img src="imagenes/logoretruco.png" alt="Logo" class="logo">
                    <span class="dot">•</span>
                    <span>DEMO GRATIS</span>
                    <span class="dot">•</span>
                    <img src="imagenes/logoretruco.png" alt="Logo" class="logo">
                    <span class="dot">•</span>
                    <span>BIEN ARGENTO</span>
                    <span class="dot">•</span>
                </div>
                <div class="marquee-item">
                    <img src="imagenes/logoretruco.png" alt="Logo" class="logo">
                    <span class="dot">•</span>
                    <span>RETRUCO</span>
                    <span class="dot">•</span>
                    <img src="imagenes/logoretruco.png" alt="Logo" class="logo">
                    <span class="dot">•</span>
                    <span>UNA HISTORIA BIEN CRIOLLA</span>
                    <span class="dot">•</span>
                    <img src="imagenes/logoretruco.png" alt="Logo" class="logo">
                    <span class="dot">•</span>
                    <span>DEMO GRATIS</span>
                    <span class="dot">•</span>
                    <img src="imagenes/logoretruco.png" alt="Logo" class="logo">
                    <span class="dot">•</span>
                    <span>BIEN ARGENTO</span>
                    <span class="dot">•</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
